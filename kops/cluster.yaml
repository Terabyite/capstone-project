apiVersion: kops.k8s.io/v1alpha2
kind: Cluster
metadata:
  name: taskapp.k8s.DOMAIN_PLACEHOLDER
spec:
  api:
    loadBalancer:
      class: Network
      type: Public

  authorization:
    rbac: {}
  channel: stable
  cloudProvider: aws

  kubernetesApiAccess:
    - 0.0.0.0/0
  sshAccess:
    - 0.0.0.0/0

  networking:
    calico: {}
  networkCIDR: 10.0.0.0/16
  networkID: VPC_ID_PLACEHOLDER

  topology:
    dns:
      type: Public
    masters: private
    nodes: private

  subnets:
    - cidr: 10.0.10.0/24
      id: PRIV_SUBNET_A
      name: us-east-1a
      type: Private
      zone: us-east-1a
    - cidr: 10.0.11.0/24
      id: PRIV_SUBNET_B
      name: us-east-1b
      type: Private
      zone: us-east-1b
    - cidr: 10.0.12.0/24
      id: PRIV_SUBNET_C
      name: us-east-1c
      type: Private
      zone: us-east-1c
    - cidr: 10.0.1.0/24
      id: PUB_SUBNET_A
      name: utility-us-east-1a
      type: Utility
      zone: us-east-1a
    - cidr: 10.0.2.0/24
      id: PUB_SUBNET_B
      name: utility-us-east-1b
      type: Utility
      zone: us-east-1b
    - cidr: 10.0.3.0/24
      id: PUB_SUBNET_C
      name: utility-us-east-1c
      type: Utility
      zone: us-east-1c

  etcdClusters:
    - cpuRequest: 200m
      etcdMembers:
        - encryptedVolume: true
          instanceGroup: control-plane-us-east-1a
          name: a
        - encryptedVolume: true
          instanceGroup: control-plane-us-east-1b
          name: b
        - encryptedVolume: true
          instanceGroup: control-plane-us-east-1c
          name: c
      manager:
        backupRetentionDays: 7
        backupStore: s3://ETCD_BUCKET_PLACEHOLDER/backups
      memoryRequest: 100Mi
      name: main
      version: 3.5.13
    - cpuRequest: 100m
      etcdMembers:
        - encryptedVolume: true
          instanceGroup: control-plane-us-east-1a
          name: a
        - encryptedVolume: true
          instanceGroup: control-plane-us-east-1b
          name: b
        - encryptedVolume: true
          instanceGroup: control-plane-us-east-1c
          name: c
      memoryRequest: 100Mi
      name: events
      version: 3.5.13

  kubernetesVersion: 1.29.6
  dnsZone: k8s.DOMAIN_PLACEHOLDER

  kubelet:
    anonymousAuth: false

  iam:
    allowContainerRegistry: true

  clusterAutoscaler:
    enabled: true
    expander: least-waste
    scaleDownUtilizationThreshold: "0.5"

  certManager:
    enabled: true

  cloudControllerManager: {}

---
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: taskapp.k8s.DOMAIN_PLACEHOLDER
  name: control-plane-us-east-1a
spec:
  image: 099720109477/ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*
  machineType: t3.medium
  maxSize: 1
  minSize: 1
  role: ControlPlane
  subnets:
    - us-east-1a

---
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: taskapp.k8s.DOMAIN_PLACEHOLDER
  name: control-plane-us-east-1b
spec:
  image: 099720109477/ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*
  machineType: t3.medium
  maxSize: 1
  minSize: 1
  role: ControlPlane
  subnets:
    - us-east-1b

---
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: taskapp.k8s.DOMAIN_PLACEHOLDER
  name: control-plane-us-east-1c
spec:
  image: 099720109477/ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*
  machineType: t3.medium
  maxSize: 1
  minSize: 1
  role: ControlPlane
  subnets:
    - us-east-1c

---
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: taskapp.k8s.DOMAIN_PLACEHOLDER
  name: nodes-us-east-1a
spec:
  image: 099720109477/ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*
  machineType: t3.medium
  maxSize: 3
  minSize: 1
  role: Node
  subnets:
    - us-east-1a
  cloudLabels:
    k8s.io/cluster-autoscaler/enabled: ""
    k8s.io/cluster-autoscaler/taskapp.k8s.DOMAIN_PLACEHOLDER: ""

---
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: taskapp.k8s.DOMAIN_PLACEHOLDER
  name: nodes-us-east-1b
spec:
  image: 099720109477/ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*
  machineType: t3.medium
  maxSize: 3
  minSize: 1
  role: Node
  subnets:
    - us-east-1b
  cloudLabels:
    k8s.io/cluster-autoscaler/enabled: ""
    k8s.io/cluster-autoscaler/taskapp.k8s.DOMAIN_PLACEHOLDER: ""

---
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: taskapp.k8s.DOMAIN_PLACEHOLDER
  name: nodes-us-east-1c
spec:
  image: 099720109477/ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*
  machineType: t3.medium
  maxSize: 3
  minSize: 1
  role: Node
  subnets:
    - us-east-1c
  cloudLabels:
    k8s.io/cluster-autoscaler/enabled: ""
    k8s.io/cluster-autoscaler/taskapp.k8s.DOMAIN_PLACEHOLDER: ""
