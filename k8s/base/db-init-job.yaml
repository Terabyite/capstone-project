apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: taskapp
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres-service 5432; do sleep 3; done"]
      containers:
        - name: db-init
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/taskapp-backend:v1.0.0
          command:
            - python
            - -c
            - |
              from app import create_app, db
              app = create_app()
              with app.app_context():
                  db.create_all()
                  print("Database tables created.")
          env:
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: taskapp-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: taskapp-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: taskapp-config
                  key: DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: taskapp-secrets
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: taskapp-secrets
                  key: DATABASE_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: taskapp-secrets
                  key: SECRET_KEY
